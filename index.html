<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小樹108．思考 × 實踐 × 職涯</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F2EFE6;
    --paper-deep:#EAE5D8;
    --paper-darker:#DFD9C8; /* hover 使用的深紙色 */
    --ink:#242219;
    --ink-soft:#6E675C;
    --ink-faint:#A39C8E;
    --rule:rgba(36,34,25,0.14);
    --rule-soft:rgba(36,34,25,0.08);
    --accent:#7A3B4E;
    --accent-soft:rgba(122,59,78,0.10);
    --c-thought:#3B5BA5;
    --c-thought-soft:rgba(59,91,165,0.10);
    --c-practice:#3F6B4F;
    --c-practice-soft:rgba(63,107,79,0.10);
    --c-career:#7A3B4E;
    --c-career-soft:rgba(122,59,78,0.10);
    --c-unsorted:#8A8478;
    --c-unsorted-soft:rgba(138,132,120,0.10);
    --radius:3px;
    --serif:'Noto Serif TC', serif;
    --sans:'Noto Sans TC', sans-serif;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}
  .wrap{max-width:880px;margin:0 auto;padding:0 24px;}

  /* ---------- Header ---------- */
  header.brand{
    padding:72px 0 40px;
    text-align:center;
    position:relative;
  }
  .stamp{
    width:56px;height:56px;
    margin:0 auto 28px;
    border:1.5px solid var(--accent);
    border-radius:4px;
    display:flex;align-items:center;justify-content:center;
    transform:rotate(-4deg);
    color:var(--accent);
    font-family:var(--serif);
    font-weight:700;
    font-size:15px;
    letter-spacing:0.5px;
  }
  .brand h1{
    font-family:var(--serif);
    font-weight:700;
    font-size:clamp(34px,6vw,48px);
    margin:0 0 14px;
    letter-spacing:2px;
  }
  .brand .tagline{
    font-size:13px;
    letter-spacing:6px;
    color:var(--ink-soft);
    text-transform:uppercase;
  }
  .brand .rule{
    width:64px;height:1px;background:var(--rule);
    margin:28px auto 0;
  }

  section{padding:48px 0;}
  section + section{border-top:1px solid var(--rule-soft);}

  .section-head{
    display:flex;align-items:baseline;justify-content:space-between;
    margin-bottom:24px;
  }
  .section-head .eyebrow{
    font-family:var(--serif);
    font-size:12px;
    letter-spacing:3px;
    color:var(--ink-faint);
    text-transform:uppercase;
  }
  .section-head .count{
    font-size:12px;color:var(--ink-faint);
  }

  /* ---------- 推薦閱讀 ---------- */
  .picks{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
    gap:20px;
  }
  .pick-card{
    background:var(--paper-deep);
    border:1px solid var(--rule);
    border-radius:var(--radius);
    padding:18px;
    display:flex;flex-direction:column;gap:8px;
    text-decoration:none;
    transition:transform 0.18s ease, border-color 0.18s ease, background-color 0.18s ease;
  }
  /* 當包含連結時的 hover 回饋 */
  a.pick-card:hover {
    transform:translateY(-2px);
    border-color:var(--ink-soft);
    background-color: var(--paper-darker);
    cursor: pointer;
  }

  /* ---------- 系列（思考/實踐/職涯） ---------- */
  .series-block{margin-bottom:44px;}
  .series-block:last-child{margin-bottom:0;}
  .series-head{
    display:flex;align-items:center;gap:10px;margin-bottom:4px;
  }
  .dot{width:9px;height:9px;border-radius:50%;flex:none;}
  .series-head h2{
    font-family:var(--serif);font-weight:600;font-size:20px;margin:0;
  }
  .series-desc{
    font-size:12.5px;color:var(--ink-soft);
    margin:2px 0 18px 19px;
  }

  /* 文章列基礎樣式 */
  .article-row{
    display:grid;
    grid-template-columns:44px 1fr auto;
    gap:16px;
    align-items:center;
    padding:14px 10px;
    margin: 0 -10px;
    border-bottom:1px solid var(--rule-soft);
    text-decoration:none;
    color:inherit;
    border-radius: var(--radius);
    transition: background-color 0.18s ease;
  }
  .article-row:last-child{border-bottom:none;}
  
  /* 有效連結時的 hover 效果 */
  a.article-row:hover {
    background-color: var(--paper-deep);
    cursor: pointer;
  }
  
  .callnum{
    font-family:var(--serif);
    font-size:12px;
    color:var(--ink-faint);
    border:1px solid var(--rule);
    border-radius:2px;
    text-align:center;
    padding:4px 0;
    background: transparent;
  }
  .article-main .title-line{
    display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;
  }
  .article-main h3{
    font-family:var(--serif);font-weight:600;font-size:15.5px;margin:0;
  }
  .tag{
    font-size:10.5px;
    padding:1px 7px;
    border-radius:20px;
    color:var(--ink-soft);
    background:var(--rule-soft);
    letter-spacing:0.5px;
  }
  .article-main .oneliner{
    font-size:12.5px;color:var(--ink-soft);margin-top:3px;
  }
  
  /* 右側容器 */
  .article-row-right{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .article-meta{
    font-size:11px;color:var(--ink-faint);
    text-align:right;white-space:nowrap;
  }
  .cover-swatch{
    width:44px;height:28px;border-radius:2px;flex:none;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--serif);font-size:10px;color:rgba(255,255,255,0.85);
  }
  .cover-img{width:44px;height:28px;object-fit:cover;border-radius:2px;flex:none;}

  /* ---------- 最新文章 ---------- */
  .latest-list{font-size:13px;}
  .latest-row{
    display:flex;justify-content:space-between;gap:12px;
    padding:8px 8px;
    margin: 0 -8px;
    border-bottom:1px dashed var(--rule-soft);
    text-decoration:none;color:var(--ink-soft);
    border-radius: var(--radius);
    transition: background-color 0.18s ease;
  }
  .latest-row:last-child{border-bottom:none;}
  .latest-row .t{color:var(--ink);}
  .latest-row .d{flex:none;color:var(--ink-faint);font-size:11px;}
  
  a.latest-row:hover {
    background-color: var(--paper-deep);
    cursor: pointer;
  }

  /* ---------- 全部文章 ---------- */
  .all-list .article-row{grid-template-columns:44px 1fr auto;}

  footer{
    padding:40px 0 60px;text-align:center;
    font-size:11.5px;color:var(--ink-faint);
  }
  .footer-links {
    margin-top: 8px;
    display: flex;
    justify-content: center;
    gap:12px;
  }
  .footer-links a {
    text-decoration: underline;
    cursor: pointer;
  }

  .state-msg{
    text-align:center;padding:60px 0;color:var(--ink-soft);font-size:13px;
  }

  /* ---------- 診斷助理彈窗樣式 ---------- */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center; justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  .modal-box {
    background: var(--paper);
    color: var(--ink);
    border: 1.5px solid var(--ink);
    border-radius: 4px;
    max-width: 650px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    font-size: 13.5px;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1.5px solid var(--rule);
    padding-bottom: 12px;
    margin-bottom: 16px;
  }
  .modal-header h3 {
    margin: 0;
    font-family: var(--serif);
    font-size: 18px;
  }
  .close-btn {
    background: none; border: none; font-size: 20px; cursor: pointer; color: var(--ink-soft);
  }
  .diag-section {
    margin-bottom: 18px;
  }
  .diag-title {
    font-weight: 600; margin-bottom: 6px; color: var(--accent);
  }
  .code-block {
    background: var(--paper-deep);
    padding: 10px;
    border-radius: var(--radius);
    font-family: monospace;
    font-size: 12px;
    overflow-x: auto;
    white-space: pre-wrap;
    border: 1px solid var(--rule-soft);
  }
  .badge {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: bold;
    color: #fff;
  }
  .badge-success { background: #3F6B4F; }
  .badge-danger { background: #7A3B4E; }
  .bullet-list {
    padding-left: 18px; margin: 6px 0;
  }
  .bullet-list li { margin-bottom: 4px; }

  /* 行動端斷點樣式優化 */
  @media (max-width:560px){
    .article-row{
      grid-template-columns:36px 1fr;
      padding:10px 4px;
      margin: 0 -4px;
    }
    .article-row-right{
      display:none !important;
    }
  }
</style>

<body>

<header class="brand">
  <div class="wrap">
    <div class="stamp">108</div>
    <h1>小樹108</h1>
    <div class="tagline">思考 × 實踐 × 職涯</div>
    <div class="rule"></div>
  </div>
</header>

<main class="wrap" id="app">
  <div class="state-msg" id="loading">正在整理書架…</div>
</main>

<footer class="wrap">
  <div>小樹108．一套持續連載的知識體系　每 108 篇集結成一冊</div>
  <div class="footer-links">
    <a id="open-diag-btn">⚙️ 試算表連線診斷助理</a>
  </div>
</footer>

<!-- 診斷助理彈跳視窗 -->
<div class="modal-overlay" id="diag-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>⚙️ 試算表連線診斷助理</h3>
      <button class="close-btn" id="close-diag-btn">×</button>
    </div>
    <div class="modal-body" id="diag-body">
      正在分析資料結構，請稍候...
    </div>
  </div>
</div>

<script>
// ================================================================
// 設定區
// ================================================================
const SHEET_ID = '1MKcQipyOEEXFbLwDXd7Vo0NkJP-k7bOnCwshnHAbgug';
const SHEET_ARTICLES = '文章';
const SHEET_SERIES   = '系列說明';
const SHEET_THEME    = 'theme';
const MAX_LATEST = 5;

// 三大分類 fallback
const SERIES_FALLBACK = {
  '思考': { desc:'理解世界的方法', color:'#3B5BA5', order:1 },
  '實踐': { desc:'把想法變成成果', color:'#3F6B4F', order:2 },
  '職涯': { desc:'成為想成為的人', color:'#7A3B4E', order:3 },
};
const UNSORTED_KEY = '尚未分類';
const UNSORTED_META = { desc:'尚未歸類的文章，之後會補上系列', color:'#8A8478', order:99 };

// 全域快取，供診斷工具隨時讀取
let rawDiagnosticData = {
  sheetId: SHEET_ID,
  fetchSuccess: false,
  fetchError: null,
  rawHeaders: [],
  rawRecords: [],
  parsedArticles: [],
  matchedUrlKey: null
};

// ================================================================
// 工具：安全轉義 HTML
// ================================================================
function escapeHTML(str) {
  if (!str) return '';
  return str.replace(/[&<>'"]/g, tag => {
    const chars = {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      "'": '&#39;',
      '"': '&quot;'
    };
    return chars[tag] || tag;
  });
}

// 容錯率高的日期解析器
function parseDateValue(dateStr) {
  if (!dateStr) return 0;
  const cleanStr = dateStr.replace(/-/g, '/');
  const timestamp = Date.parse(cleanStr);
  return isNaN(timestamp) ? 0 : timestamp;
}

// 實用的網址標準化解析器
function normalizeUrl(urlStr) {
  if (!urlStr) return '';
  let trimmed = urlStr.trim();
  if (!trimmed) return '';
  
  if (/^(mailto:|tel:|javascript:|#|\/)/i.test(trimmed)) {
    return trimmed;
  }
  
  if (!/^https?:\/\//i.test(trimmed)) {
    return 'https://' + trimmed;
  }
  return trimmed;
}

// ================================================================
// 工具：gviz/tq CSV 抓取與解析
// ================================================================
function gvizUrl(sheetName){
  const cacheBuster = new Date().getTime();
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}&t=${cacheBuster}`;
}

// 簡易 CSV 解析（支援雙引號包欄位、欄位內逗號／換行）
function parseCSV(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(field); field=''; }
      else if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else if(c === '\r'){ /* skip */ }
      else field += c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r => r.some(v => v !== ''));
}

function cleanHeader(h){
  return (h || '').trim().split(/[\s←]+/)[0];
}

async function fetchSheet(sheetName){
  const res = await fetch(gvizUrl(sheetName));
  if(!res.ok) throw new Error('無法讀取分頁：' + sheetName);
  
  // 核心修復：徹底過濾掉可能附加在第一欄最前方的 UTF-8 BOM (\ufeff) 隱形字元
  let text = await res.text();
  text = text.replace(/^\uFEFF/, '');
  
  const rows = parseCSV(text);
  if(rows.length === 0) return { headers:[], records:[] };
  const headers = rows[0].map(cleanHeader);
  const records = rows.slice(1).map(r => {
    const obj = {};
    headers.forEach((h,idx) => { obj[h] = (r[idx] || '').trim(); });
    return obj;
  });
  return { headers, records };
}

// 超強防呆模糊匹配選取器（忽略欄名的大小寫與前後空格）
function pick(record, candidates){
  // 1. 將本列所有欄位名稱整理成「去空白、轉小寫」的對照表
  const normalizedRecord = {};
  for (const key in record) {
    if (record.hasOwnProperty(key)) {
      const normKey = key.trim().toLowerCase();
      normalizedRecord[normKey] = record[key];
    }
  }
  
  // 2. 比對候選名單
  for(const name of candidates){
    const normName = name.trim().toLowerCase();
    if(normalizedRecord.hasOwnProperty(normName) && normalizedRecord[normName] !== '') {
      // 順便把成功配對到的原始欄位名稱記錄在診斷器中
      for (const rawKey in record) {
        if (rawKey.trim().toLowerCase() === normName) {
          rawDiagnosticData.matchedUrlKey = rawKey;
        }
      }
      return normalizedRecord[normName];
    }
  }
  return '';
}

// ================================================================
// 主流程
// ================================================================
async function init(){
  const app = document.getElementById('app');
  let articleRows = [];
  let seriesMeta = {};

  try {
    const [articlesRes, seriesRes] = await Promise.all([
      fetchSheet(SHEET_ARTICLES),
      fetchSheet(SHEET_SERIES).catch(() => ({ records: [] }))
    ]);

    articleRows = articlesRes.records;
    
    // 將原始資料寫入診斷全域變數
    rawDiagnosticData.fetchSuccess = true;
    rawDiagnosticData.rawHeaders = articlesRes.headers;
    rawDiagnosticData.rawRecords = articlesRes.records;

    if (seriesRes.records && seriesRes.records.length > 0) {
      seriesRes.records.forEach(r => {
        const name = pick(r, ['系列名稱']);
        if(!name) return;
        seriesMeta[name] = {
          desc: pick(r, ['系列說明']) || (SERIES_FALLBACK[name]?.desc || ''),
          color: pick(r, ['顏色']) || (SERIES_FALLBACK[name]?.color || '#8A8478'),
          order: Number(pick(r, ['排序'])) || (SERIES_FALLBACK[name]?.order || 50),
        };
      });
    }
  } catch(e){
    rawDiagnosticData.fetchSuccess = false;
    rawDiagnosticData.fetchError = e.message;
    app.innerHTML = `<div class="state-msg">文章資料讀取失敗，請確認試算表分享權限。<br>${escapeHTML(e.message)}</div>`;
    return;
  }

  if(Object.keys(seriesMeta).length === 0) seriesMeta = { ...SERIES_FALLBACK };

  // 整理文章資料
  const articles = articleRows.map(r => {
    const id = pick(r, ['編號']);
    const mainCategory = pick(r, ['思考x實踐x職涯','思考×實踐×職涯','類別']);
    const subSeries = pick(r, ['系列','三大面向系列連載']);
    const cover = pick(r, ['封面']);
    const title = pick(r, ['文章標題']);
    
    // 超大模糊匹配庫，防呆欄位拼寫
    const urlRaw = pick(r, ['網址', '連結', 'URL', 'url', 'Link', 'link', '文章連結', '連結網址']);
    const url = normalizeUrl(urlRaw);
    
    const oneLiner = pick(r, ['一句話定位']);
    const pubDate = pick(r, ['發佈日']);
    const orderRaw = pick(r, ['排序']);
    const displayRaw = pick(r, ['顯示']);
    const featuredRaw = pick(r, ['推薦閱讀']);
    const featuredOrderRaw = pick(r, ['推薦順序']);
    const subTagsRaw = pick(r, ['副標籤']);

    return {
      id, title, url, oneLiner, pubDate, cover,
      category: SERIES_FALLBACK[mainCategory] ? mainCategory : (mainCategory || ''),
      subSeries,
      order: orderRaw ? Number(orderRaw) : (Number(id) || 9999),
      display: displayRaw === '' ? true : displayRaw === '✓',
      featured: featuredRaw === '✓',
      featuredOrder: featuredOrderRaw ? Number(featuredOrderRaw) : 9999,
      subTags: subTagsRaw ? subTagsRaw.split(/[,，]/).map(s=>s.trim()).filter(Boolean) : [],
    };
  }).filter(a => a.display && a.title);

  // 暫存解析後的文章清單供偵錯分析
  rawDiagnosticData.parsedArticles = articles;

  render(app, articles, seriesMeta);
}

function coverEl(article, color){
  if(article.cover && /^https?:\/\//.test(article.cover)){
    const img = document.createElement('img');
    img.className = 'cover-img';
    img.src = article.cover;
    img.alt = '';
    return img;
  }
  const div = document.createElement('div');
  div.className = 'cover-swatch';
  div.style.background = color;
  if(article.cover) div.textContent = article.cover;
  return div;
}

function articleRowEl(article, color){
  const hasUrl = !!article.url;
  // 如果沒有網址，渲染為無 hover 特效的普通 div，有網址則渲染為 a 超連結
  const el = document.createElement(hasUrl ? 'a' : 'div');
  el.className = 'article-row';
  if(hasUrl){ 
    el.href = article.url; 
    el.target = '_blank'; 
    el.rel = 'noopener'; 
  }

  const num = document.createElement('div');
  num.className = 'callnum';
  num.textContent = article.id || '—';

  const main = document.createElement('div');
  main.className = 'article-main';
  const titleLine = document.createElement('div');
  titleLine.className = 'title-line';
  const h3 = document.createElement('h3');
  h3.textContent = article.title;
  titleLine.appendChild(h3);
  article.subTags.forEach(t => {
    const tag = document.createElement('span');
    tag.className = 'tag'; tag.textContent = t;
    titleLine.appendChild(tag);
  });
  main.appendChild(titleLine);
  if(article.oneLiner){
    const p = document.createElement('div');
    p.className = 'oneliner';
    p.textContent = article.oneLiner;
    main.appendChild(p);
  }

  const right = document.createElement('div');
  right.className = 'article-row-right';
  const meta = document.createElement('div');
  meta.className = 'article-meta';
  meta.textContent = article.pubDate || '';
  right.appendChild(coverEl(article, color));
  right.appendChild(meta);

  el.appendChild(num);
  el.appendChild(main);
  el.appendChild(right);
  return el;
}

function render(app, articles, seriesMeta){
  app.innerHTML = '';

  // ---------- 推薦閱讀 ----------
  const picks = articles.filter(a => a.featured).sort((a,b)=>a.featuredOrder-b.featuredOrder);
  if(picks.length){
    const section = document.createElement('section');
    section.innerHTML = `<div class="section-head"><span class="eyebrow">推薦閱讀</span><span class="count">${picks.length} 篇</span></div>`;
    const grid = document.createElement('div');
    grid.className = 'picks';
    picks.forEach(a => {
      const color = seriesMeta[a.category]?.color || UNSORTED_META.color;
      const hasUrl = !!a.url;
      const card = document.createElement(hasUrl ? 'a' : 'div');
      card.className = 'pick-card';
      if(hasUrl){ card.href = a.url; card.target = '_blank'; card.rel = 'noopener'; }
      card.innerHTML = `<span class="num" style="color:${color}">${escapeHTML(a.id)}</span><h3>${escapeHTML(a.title)}</h3><p>${escapeHTML(a.oneLiner||'')}</p>`;
      grid.appendChild(card);
    });
    section.appendChild(grid);
    app.appendChild(section);
  }

  // ---------- 系列（思考/實踐/職涯 + 尚未分類）----------
  const grouped = {};
  articles.forEach(a => {
    const key = a.category || UNSORTED_KEY;
    if(!grouped[key]) grouped[key] = [];
    grouped[key].push(a);
  });
  const seriesOrder = Object.keys(grouped).sort((a,b)=>{
    const oa = a===UNSORTED_KEY ? UNSORTED_META.order : (seriesMeta[a]?.order ?? 50);
    const ob = b===UNSORTED_KEY ? UNSORTED_META.order : (seriesMeta[b]?.order ?? 50);
    return oa-ob;
  });

  const seriesSection = document.createElement('section');
  seriesSection.innerHTML = `<div class="section-head"><span class="eyebrow">系列</span></div>`;
  seriesOrder.forEach(key => {
    const meta = key===UNSORTED_KEY ? UNSORTED_META : (seriesMeta[key] || UNSORTED_META);
    const list = grouped[key].slice().sort((a,b)=>a.order-b.order);
    const block = document.createElement('div');
    block.className = 'series-block';
    block.innerHTML = `
      <div class="series-head">
        <span class="dot" style="background:${escapeHTML(meta.color)}"></span>
        <h2>${escapeHTML(key)}</h2>
      </div>
      <div class="series-desc">${escapeHTML(meta.desc || '')}${key===UNSORTED_KEY ? '' : ` · ${list.length} 篇`}</div>
    `;
    list.forEach(a => block.appendChild(articleRowEl(a, meta.color)));
    seriesSection.appendChild(block);
  });
  app.appendChild(seriesSection);

  // ---------- 最新文章 ----------
  const dated = articles.filter(a => a.pubDate).sort((a,b) => parseDateValue(b.pubDate) - parseDateValue(a.pubDate));
  if(dated.length){
    const latest = dated.slice(0, MAX_LATEST);
    const section = document.createElement('section');
    section.innerHTML = `<div class="section-head"><span class="eyebrow">最新文章</span></div>`;
    const list = document.createElement('div');
    list.className = 'latest-list';
    latest.forEach(a => {
      const hasUrl = !!a.url;
      const row = document.createElement(hasUrl ? 'a' : 'div');
      row.className = 'latest-row';
      if(hasUrl){ row.href = a.url; row.target = '_blank'; row.rel = 'noopener'; }
      row.innerHTML = `<span class="t">${escapeHTML(a.title)}</span><span class="d">${escapeHTML(a.pubDate)}</span>`;
      list.appendChild(row);
    });
    section.appendChild(list);
    app.appendChild(section);
  }

  // ---------- 全部文章 ----------
  const allSection = document.createElement('section');
  allSection.innerHTML = `<div class="section-head"><span class="eyebrow">全部文章</span><span class="count">${articles.length} 篇</span></div>`;
  const allList = document.createElement('div');
  allList.className = 'all-list';
  dated.concat(articles.filter(a => !a.pubDate)).forEach(a => {
    const color = seriesMeta[a.category]?.color || UNSORTED_META.color;
    allList.appendChild(articleRowEl(a, color));
  });
  allSection.appendChild(allList);
  app.appendChild(allSection);
}

// ================================================================
// 診斷助理核心邏輯
// ================================================================
const modal = document.getElementById('diag-modal');
const openBtn = document.getElementById('open-diag-btn');
const closeBtn = document.getElementById('close-diag-btn');
const diagBody = document.getElementById('diag-body');

openBtn.addEventListener('click', () => {
  modal.style.display = 'flex';
  runDiagnostics();
});

closeBtn.addEventListener('click', () => {
  modal.style.display = 'none';
});

window.addEventListener('click', (e) => {
  if (e.target === modal) modal.style.display = 'none';
});

function runDiagnostics() {
  const d = rawDiagnosticData;
  let html = '';

  // 1. 基本連線狀態
  html += `<div class="diag-section">`;
  html += `<div class="diag-title">1. 連線診斷</div>`;
  if (d.fetchSuccess) {
    html += `<div>連線狀態：<span class="badge badge-success">正常連線</span></div>`;
    html += `<div>已從試算表下載 <strong style="color:var(--accent)">${d.rawRecords.length}</strong> 筆原始列資料。</div>`;
  } else {
    html += `<div>連線狀態：<span class="badge badge-danger">連線失敗</span></div>`;
    html += `<div style="color:var(--accent); margin-top:5px;">錯誤訊息：${escapeHTML(d.fetchError || '未知錯誤')}</div>`;
    html += `<p>💡 請檢查：你的試算表「共用」設定中，是否已開啟「知道連結的人可以檢視」？</p>`;
  }
  html += `</div>`;

  if (!d.fetchSuccess) {
    diagBody.innerHTML = html;
    return;
  }

  // 2. 欄位結構偵測
  html += `<div class="diag-section">`;
  html += `<div class="diag-title">2. 欄位對接診斷</div>`;
  html += `<div>試算表「文章」分頁中被偵測到的【原始欄位清單】：</div>`;
  html += `<div class="code-block" style="margin-top: 5px;">${escapeHTML(JSON.stringify(d.rawHeaders))}</div>`;
  
  // 檢驗是否有成功對接網址欄
  if (d.matchedUrlKey) {
    html += `<div style="margin-top:8px;">對接狀態：<span class="badge badge-success">成功配對</span> 網頁已成功將試算表中的「<strong>${escapeHTML(d.matchedUrlKey)}</strong>」欄位辨識為網址連結。</div>`;
  } else {
    html += `<div style="margin-top:8px;">對接狀態：<span class="badge badge-danger">配對失敗</span> 網頁無法辨識任何網址欄位。</div>`;
  }
  html += `</div>`;

  // 3. 前三筆文章網址解析結果
  html += `<div class="diag-section">`;
  html += `<div class="diag-title">3. 實際資料解析預覽（前 3 筆）</div>`;
  
  const sample = d.parsedArticles.slice(0, 3);
  if (sample.length === 0) {
    html += `<div style="color:var(--accent)">無任何有效的顯示文章，請確認試算表中「顯示」欄位是否確實填寫。</div>`;
  } else {
    sample.forEach((art, i) => {
      const rawRec = d.rawRecords[i] || {};
      const rawUrlValue = d.matchedUrlKey ? rawRec[d.matchedUrlKey] : '(無)';
      const hasLink = !!art.url;

      html += `<div style="background:var(--paper-deep); padding:8px; border-radius:3px; margin-bottom:8px; border:1px solid var(--rule-soft)">`;
      html += `<div><strong>標題：</strong>${escapeHTML(art.title)} (編號: ${escapeHTML(art.id)})</div>`;
      html += `<div><strong>試算表原始值：</strong> <code style="background:rgba(0,0,0,0.05); padding:1px 4px;">"${escapeHTML(rawUrlValue)}"</code></div>`;
      html += `<div><strong>網頁解析結果：</strong> ${hasLink ? `<a href="${art.url}" target="_blank" style="color:#3B5BA5; text-decoration:underline;">${escapeHTML(art.url)}</a> <span class="badge badge-success">可正常點擊</span>` : `<span class="badge badge-danger">純文字（無法點擊）</span>`}</div>`;
      
      // 給予警告指引
      if (!hasLink) {
        html += `<div style="color:var(--accent); font-size:12px; margin-top:4px; border-top:1px dashed var(--rule); padding-top:4px;">`;
        html += `⚠️ 診斷提示：此列的網址值為空。請確保試算表中該儲存格是<strong>直接貼上純文字 URL</strong> (如 https://...)，千萬不要使用 \`=HYPERLINK\` 公式或點擊 Google 的右鍵插入連結！`;
        html += `</div>`;
      }
      html += `</div>`;
    });
  }
  html += `</div>`;

  // 4. 自助修復教學
  html += `<div class="diag-section" style="border-top:1.5px dashed var(--rule); padding-top:12px;">`;
  html += `<div class="diag-title">🛠️ 連結修復快速指引</div>`;
  html += `<ul class="bullet-list">`;
  html += `<li><strong>做法 A：檢查欄位標題</strong><br>請在 Google 試算表最上方標題列，確保有一欄的名稱完全叫做：<code>網址</code> 或是 <code>連結</code>。</li>`;
  html += `<li><strong>做法 B：格式務必為「純文字網址」</strong><br>切勿在格子內寫 <code>=HYPERLINK("網址", "標題")</code>，這會導致 API 匯出時網址被濾掉。請在該格「直接貼上」<code>https://...</code> 純網址字串。</li>`;
  html += `<li><strong>做法 C：不要內嵌連結</strong><br>請不要使用試算表的「插入連結」功能（即在標題文字背後藏超連結），API 同樣無法讀取，必須將網址單獨放一欄。</li>`;
  html += `</ul>`;
  html += `</div>`;

  diagBody.innerHTML = html;
}

init();
</script>
</body>
</html>
