<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小樹108．思考 × 實踐 × 職涯</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F2EFE6;
    --paper-deep:#EAE5D8;
    --paper-darker:#DFD9C8; /* hover 使用的深紙色 */
    --ink:#242219;
    --ink-soft:#6E675C;
    --ink-faint:#A39C8E;
    --rule:rgba(36,34,25,0.14);
    --rule-soft:rgba(36,34,25,0.08);
    --accent:#7A3B4E;
    --accent-soft:rgba(122,59,78,0.10);
    --c-thought:#3D7A57;
    --c-thought-soft:rgba(61,122,87,0.10);
    --c-practice:#3B5BA5;
    --c-practice-soft:rgba(59,91,165,0.10);
    --c-career:#B5651D;
    --c-career-soft:rgba(181,101,29,0.10);
    --c-course:#8C6A2E;
    --c-course-soft:rgba(140,106,46,0.10);
    --c-unsorted:#8A8478;
    --c-unsorted-soft:rgba(138,132,120,0.10);
    --radius:3px;
    --serif:'Noto Serif TC', serif;
    --sans:'Noto Sans TC', sans-serif;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}
  .wrap{max-width:880px;margin:0 auto;padding:0 24px;}

  /* ---------- Header ---------- */
  header.brand{
    padding:72px 0 24px;
    text-align:center;
    position:relative;
  }
  .stamp{
    width:56px;height:56px;
    margin:0 auto 28px;
    border:1.5px solid var(--accent);
    border-radius:4px;
    display:flex;align-items:center;justify-content:center;
    transform:rotate(-4deg);
    color:var(--accent);
    font-family:var(--serif);
    font-weight:700;
    font-size:15px;
    letter-spacing:0.5px;
  }
  .brand h1{
    font-family:var(--serif);
    font-weight:700;
    font-size:clamp(34px,6vw,48px);
    margin:0 0 14px;
    letter-spacing:2px;
  }
  .brand .tagline{
    font-size:13px;
    letter-spacing:6px;
    color:var(--ink-soft);
    text-transform:uppercase;
  }
  .brand .rule{
    width:64px;height:1px;background:var(--rule);
    margin:28px auto 0;
  }

  section{padding:48px 0;}
  section + section{border-top:1px solid var(--rule-soft);}

  .section-head{
    display:flex;align-items:baseline;justify-content:space-between;
    margin-bottom:24px;
  }
  .section-head .eyebrow{
    font-family:var(--serif);
    font-size:12px;
    letter-spacing:3px;
    color:var(--ink-faint);
    text-transform:uppercase;
  }
  .section-head .count{
    font-size:12px;color:var(--ink-faint);
  }

  /* ---------- 分類導覽色塊 ---------- */
  .nav-badges{
    display:flex;flex-wrap:wrap;justify-content:center;gap:10px;
    margin:8px 0 0;
  }
  .nav-badge{
    display:inline-flex;align-items:center;gap:7px;
    padding:6px 14px;border-radius:4px;
    font-family:var(--sans);font-size:13px;font-weight:500;
    text-decoration:none;
    transition:opacity 0.18s ease, transform 0.18s ease;
  }
  .nav-badge:hover{opacity:0.78;transform:translateY(-1px);}
  .nav-badge .deco{
    width:11px;height:11px;border-radius:2px;flex:none;
  }
  .nav-badge.home{
    background:transparent;
    border:1px solid var(--ink);
    color:var(--ink);
  }
  .nav-badge.home:hover{background:var(--paper-deep);}

  .nav-badges + section{padding-top:28px;}

  /* ---------- 推薦閱讀 ---------- */
  .picks{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
    gap:20px;
  }
  .pick-card{
    background:var(--paper-deep);
    border:1px solid var(--rule);
    border-radius:var(--radius);
    padding:18px;
    display:flex;flex-direction:column;gap:8px;
    text-decoration:none;
    transition:transform 0.18s ease, border-color 0.18s ease, background-color 0.18s ease;
  }
  /* 當包含連結時的 hover 回饋 */
  a.pick-card:hover {
    transform:translateY(-2px);
    border-color:var(--ink-soft);
    background-color: var(--paper-darker);
    cursor: pointer;
  }

  /* ---------- 系列（思考/實踐/職涯） ---------- */
  .series-block{margin-bottom:44px;}
  .series-block:last-child{margin-bottom:0;}
  .series-head{
    display:flex;align-items:center;gap:10px;margin-bottom:4px;
  }
  .dot{width:9px;height:9px;border-radius:50%;flex:none;}
  .series-head h2{
    font-family:var(--serif);font-weight:600;font-size:20px;margin:0;
  }
  .series-desc{
    font-size:12.5px;color:var(--ink-soft);
    margin:2px 0 18px 19px;
  }

  /* 文章列基礎樣式 */
  .article-row{
    display:grid;
    grid-template-columns:44px 1fr auto;
    gap:16px;
    align-items:center;
    padding:14px 10px;
    margin: 0 -10px;
    border-bottom:1px solid var(--rule-soft);
    text-decoration:none;
    color:inherit;
    border-radius: var(--radius);
    transition: background-color 0.18s ease;
  }
  .article-row:last-child{border-bottom:none;}
  
  /* 有效連結時的 hover 效果 */
  a.article-row:hover {
    background-color: var(--paper-deep);
    cursor: pointer;
  }
  
  .callnum{
    font-family:var(--serif);
    font-size:12px;
    color:var(--ink-faint);
    border:1px solid var(--rule);
    border-radius:2px;
    text-align:center;
    padding:4px 0;
    background: transparent;
  }
  .article-main .title-line{
    display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;
  }
  .article-main h3{
    font-family:var(--serif);font-weight:600;font-size:15.5px;margin:0;
  }
  .tag{
    font-size:10.5px;
    padding:1px 7px;
    border-radius:20px;
    color:var(--ink-soft);
    background:var(--rule-soft);
    letter-spacing:0.5px;
  }
  .article-main .oneliner{
    font-size:12.5px;color:var(--ink-soft);margin-top:3px;
  }
  
  /* 右側容器 */
  .article-row-right{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .article-meta{
    font-size:11px;color:var(--ink-faint);
    text-align:right;white-space:nowrap;
  }
  .cover-swatch{
    width:44px;height:28px;border-radius:2px;flex:none;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--serif);font-size:10px;color:rgba(255,255,255,0.85);
  }
  .cover-img{width:44px;height:28px;object-fit:cover;border-radius:2px;flex:none;}

  /* ---------- 最新文章 ---------- */
  .latest-list{font-size:13px;}
  .latest-row{
    display:flex;justify-content:space-between;gap:12px;
    padding:8px 8px;
    margin: 0 -8px;
    border-bottom:1px dashed var(--rule-soft);
    text-decoration:none;color:var(--ink-soft);
    border-radius: var(--radius);
    transition: background-color 0.18s ease;
  }
  .latest-row:last-child{border-bottom:none;}
  .latest-row .t{color:var(--ink);}
  .latest-row .d{flex:none;color:var(--ink-faint);font-size:11px;}
  
  a.latest-row:hover {
    background-color: var(--paper-deep);
    cursor: pointer;
  }

  /* ---------- 全部文章 ---------- */
  .all-list .article-row{grid-template-columns:44px 1fr auto;}

  footer{
    padding:40px 0 60px;text-align:center;
    font-size:11.5px;color:var(--ink-faint);
  }
  .state-msg{
    text-align:center;padding:60px 0;color:var(--ink-soft);font-size:13px;
  }

  /* 行動端斷點樣式優化 */
  @media (max-width:560px){
    .article-row{
      grid-template-columns:36px 1fr;
      padding:10px 4px;
      margin: 0 -4px;
    }
    .article-row-right{
      display:none !important;
    }
    .nav-badge{
      padding:7px 12px;font-size:12.5px;gap:6px;
    }
    .nav-badge .deco{width:11px;height:11px;}
  }
</style>
</head>
<body>

<header class="brand">
  <div class="wrap">
    <div class="stamp">108</div>
    <h1>小樹108</h1>
    <div class="tagline">思考 × 實踐 × 職涯</div>
    <div class="rule"></div>
  </div>
</header>

<main class="wrap" id="app">
  <div class="state-msg" id="loading">正在整理書架…</div>
</main>

<footer class="wrap">
  <div>小樹紮根．知識成林</div>
</footer>

<script>
// ================================================================
// 設定區
// ================================================================
const SHEET_ID = '1MKcQipyOEEXFbLwDXd7Vo0NkJP-k7bOnCwshnHAbgug';
const SHEET_ARTICLES = '文章';
const SHEET_SERIES   = '系列說明';
const SHEET_THEME    = 'theme';
const MAX_LATEST = 5;

// 四大分類 fallback
const SERIES_FALLBACK = {
  '思考': { desc:'理解世界的方法', color:'#3D7A57', order:1 },
  '實踐': { desc:'把想法變成成果', color:'#3B5BA5', order:2 },
  '職涯': { desc:'成為想成為的人', color:'#B5651D', order:3 },
  '課程': { desc:'從課程現場延伸出的教學紀錄', color:'#8C6A2E', order:4 },
};
const UNSORTED_KEY = '尚未分類';
const UNSORTED_META = { desc:'尚未歸類的文章，之後會補上系列', color:'#8A8478', order:99 };

// 導覽色塊固定順序與網址 hash 對應（課程放最後）
const CATEGORY_ORDER = ['思考','實踐','職涯','課程'];
const CATEGORY_SLUGS = { '思考':'thought', '實踐':'practice', '職涯':'career', '課程':'course' };
const SLUG_TO_CATEGORY = Object.fromEntries(Object.entries(CATEGORY_SLUGS).map(([k,v]) => [v,k]));

function getCurrentFilter(){
  const slug = (location.hash || '').replace('#','').trim();
  return SLUG_TO_CATEGORY[slug] || null;
}

// ================================================================
// 工具：安全轉義 HTML
// ================================================================
function escapeHTML(str) {
  if (!str) return '';
  return str.replace(/[&<>'"]/g, tag => {
    const chars = {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      "'": '&#39;',
      '"': '&quot;'
    };
    return chars[tag] || tag;
  });
}

// 容錯率高的日期解析器
function parseDateValue(dateStr) {
  if (!dateStr) return 0;
  const cleanStr = dateStr.replace(/-/g, '/');
  const timestamp = Date.parse(cleanStr);
  return isNaN(timestamp) ? 0 : timestamp;
}

// 實用的網址標準化解析器
function normalizeUrl(urlStr) {
  if (!urlStr) return '';
  let trimmed = urlStr.trim();
  if (!trimmed) return '';
  
  if (/^(mailto:|tel:|javascript:|#|\/)/i.test(trimmed)) {
    return trimmed;
  }
  
  if (!/^https?:\/\//i.test(trimmed)) {
    return 'https://' + trimmed;
  }
  return trimmed;
}

// ================================================================
// 工具：gviz/tq CSV 抓取與解析
// ================================================================
function gvizUrl(sheetName){
  const cacheBuster = new Date().getTime();
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}&t=${cacheBuster}`;
}

// 簡易 CSV 解析（支援雙引號包欄位、欄位內逗號／換行）
function parseCSV(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(field); field=''; }
      else if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else if(c === '\r'){ /* skip */ }
      else field += c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r => r.some(v => v !== ''));
}

function cleanHeader(h){
  return (h || '').trim().split(/[\s←]+/)[0];
}

async function fetchSheet(sheetName){
  const res = await fetch(gvizUrl(sheetName));
  if(!res.ok) throw new Error('無法讀取分頁：' + sheetName);
  
  // 核心修復：徹底過濾掉可能附加在第一欄最前方的 UTF-8 BOM (\ufeff) 隱形字元
  let text = await res.text();
  text = text.replace(/^\uFEFF/, '');
  
  const rows = parseCSV(text);
  if(rows.length === 0) return { headers:[], records:[] };
  const headers = rows[0].map(cleanHeader);
  const records = rows.slice(1).map(r => {
    const obj = {};
    headers.forEach((h,idx) => { obj[h] = (r[idx] || '').trim(); });
    return obj;
  });
  return { headers, records };
}

// 超強防呆模糊匹配選取器（忽略欄名的大小寫與前後空格）
function pick(record, candidates){
  // 1. 將本列所有欄位名稱整理成「去空白、轉小寫」的對照表
  const normalizedRecord = {};
  for (const key in record) {
    if (record.hasOwnProperty(key)) {
      const normKey = key.trim().toLowerCase();
      normalizedRecord[normKey] = record[key];
    }
  }
  
  // 2. 比對候選名單
  for(const name of candidates){
    const normName = name.trim().toLowerCase();
    if(normalizedRecord.hasOwnProperty(normName) && normalizedRecord[normName] !== '') {
      return normalizedRecord[normName];
    }
  }
  return '';
}

// ================================================================
// 主流程
// ================================================================
async function init(){
  const app = document.getElementById('app');
  let articleRows = [];
  let seriesMeta = {};

  try {
    const [articlesRes, seriesRes] = await Promise.all([
      fetchSheet(SHEET_ARTICLES),
      fetchSheet(SHEET_SERIES).catch(() => ({ records: [] }))
    ]);

    articleRows = articlesRes.records;

    if (seriesRes.records && seriesRes.records.length > 0) {
      seriesRes.records.forEach(r => {
        const name = pick(r, ['系列名稱']);
        if(!name) return;
        seriesMeta[name] = {
          desc: pick(r, ['系列說明']) || (SERIES_FALLBACK[name]?.desc || ''),
          color: pick(r, ['顏色']) || (SERIES_FALLBACK[name]?.color || '#8A8478'),
          order: Number(pick(r, ['排序'])) || (SERIES_FALLBACK[name]?.order || 50),
        };
      });
    }
  } catch(e){
    app.innerHTML = `<div class="state-msg">文章資料讀取失敗，請確認試算表分享權限。<br>${escapeHTML(e.message)}</div>`;
    return;
  }

  if(Object.keys(seriesMeta).length === 0) seriesMeta = { ...SERIES_FALLBACK };

  // 整理文章資料
  const articles = articleRows.map(r => {
    const id = pick(r, ['編號']);
    const mainCategory = pick(r, ['思考x實踐x職涯','思考×實踐×職涯','類別']);
    const subSeries = pick(r, ['系統','系列','三大面向系列連載']);
    const cover = pick(r, ['封面']);
    const title = pick(r, ['文章標題','部落標題']);
    
    // 超大模糊匹配庫，防呆欄位拼寫
    const urlRaw = pick(r, ['網址', '部落網址', '連結', 'URL', 'url', 'Link', 'link', '文章連結', '連結網址']);
    const url = normalizeUrl(urlRaw);
    
    const oneLiner = pick(r, ['一句話定位']);
    const pubDate = pick(r, ['發佈日','發佈日期']);
    const orderRaw = pick(r, ['排序']);
    const displayRaw = pick(r, ['顯示']);
    const featuredRaw = pick(r, ['推薦閱讀']);
    const featuredOrderRaw = pick(r, ['推薦順序']);
    const subTagsRaw = pick(r, ['副標籤']);

    return {
      id, title, url, oneLiner, pubDate, cover,
      category: SERIES_FALLBACK[mainCategory] ? mainCategory : (mainCategory || ''),
      subSeries,
      order: orderRaw ? Number(orderRaw) : (Number(id) || 9999),
      display: displayRaw === '' ? true : displayRaw === '✓',
      featured: featuredRaw === '✓',
      featuredOrder: featuredOrderRaw ? Number(featuredOrderRaw) : 9999,
      subTags: subTagsRaw ? subTagsRaw.split(/[,，]/).map(s=>s.trim()).filter(Boolean) : [],
    };
  }).filter(a => a.display && a.title);

  // 保存供 hash 切換時重繪使用，不需重新抓取試算表
  currentArticles = articles;
  currentSeriesMeta = seriesMeta;

  render(app, articles, seriesMeta);
}

let currentArticles = null;
let currentSeriesMeta = null;
window.addEventListener('hashchange', () => {
  if(currentArticles){
    render(document.getElementById('app'), currentArticles, currentSeriesMeta);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
});

function coverEl(article, color){
  if(article.cover && /^https?:\/\//.test(article.cover)){
    const img = document.createElement('img');
    img.className = 'cover-img';
    img.src = article.cover;
    img.alt = '';
    return img;
  }
  const div = document.createElement('div');
  div.className = 'cover-swatch';
  div.style.background = color;
  if(article.cover) div.textContent = article.cover;
  return div;
}

function articleRowEl(article, color){
  const hasUrl = !!article.url;
  // 如果沒有網址，渲染為無 hover 特效的普通 div，有網址則渲染為 a 超連結
  const el = document.createElement(hasUrl ? 'a' : 'div');
  el.className = 'article-row';
  if(hasUrl){ 
    el.href = article.url; 
    el.target = '_blank'; 
    el.rel = 'noopener'; 
  }

  const num = document.createElement('div');
  num.className = 'callnum';
  num.textContent = article.id || '—';

  const main = document.createElement('div');
  main.className = 'article-main';
  const titleLine = document.createElement('div');
  titleLine.className = 'title-line';
  const h3 = document.createElement('h3');
  h3.textContent = article.title;
  titleLine.appendChild(h3);
  article.subTags.forEach(t => {
    const tag = document.createElement('span');
    tag.className = 'tag'; tag.textContent = t;
    titleLine.appendChild(tag);
  });
  main.appendChild(titleLine);
  if(article.oneLiner){
    const p = document.createElement('div');
    p.className = 'oneliner';
    p.textContent = article.oneLiner;
    main.appendChild(p);
  }

  const right = document.createElement('div');
  right.className = 'article-row-right';
  const meta = document.createElement('div');
  meta.className = 'article-meta';
  meta.textContent = article.pubDate || '';
  right.appendChild(coverEl(article, color));
  right.appendChild(meta);

  el.appendChild(num);
  el.appendChild(main);
  el.appendChild(right);
  return el;
}

// 十六進位色碼轉 rgba（供淡色底徽章使用）
function hexToRgba(hex, alpha){
  const clean = hex.replace('#','');
  const full = clean.length === 3 ? clean.split('').map(c => c+c).join('') : clean;
  const num = parseInt(full, 16);
  const r = (num >> 16) & 255, g = (num >> 8) & 255, b = num & 255;
  return `rgba(${r},${g},${b},${alpha})`;
}

// 每個系列區塊內的排序：推薦文章優先（不受排序欄限制，永遠排第1），
// 其餘依「排序」欄由小到大
function sortSeriesArticles(list){
  const featured = list.filter(a => a.featured).sort((a,b)=>a.featuredOrder-b.featuredOrder);
  const rest = list.filter(a => !a.featured).sort((a,b)=>a.order-b.order);
  return featured.concat(rest);
}

function buildSeriesBlock(key, list, meta){
  const block = document.createElement('div');
  block.className = 'series-block';
  block.innerHTML = `
    <div class="series-head">
      <span class="dot" style="background:${escapeHTML(meta.color)}"></span>
      <h2>${escapeHTML(key)}</h2>
    </div>
    <div class="series-desc">${escapeHTML(meta.desc || '')}${key===UNSORTED_KEY ? '' : ` · ${list.length} 篇`}</div>
  `;
  sortSeriesArticles(list).forEach(a => block.appendChild(articleRowEl(a, meta.color)));
  return block;
}

function render(app, articles, seriesMeta){
  app.innerHTML = '';
  const activeCategory = getCurrentFilter();

  const grouped = {};
  articles.forEach(a => {
    const key = a.category || UNSORTED_KEY;
    if(!grouped[key]) grouped[key] = [];
    grouped[key].push(a);
  });

  // ---------- 分類導覽色塊 ----------
  const nav = document.createElement('nav');
  nav.className = 'nav-badges';
  CATEGORY_ORDER.forEach(key => {
    const meta = seriesMeta[key] || SERIES_FALLBACK[key];
    const isActive = activeCategory === key;
    const badge = document.createElement('a');
    if(isActive){
      badge.className = 'nav-badge home';
      badge.href = '#';
      badge.textContent = '回首頁';
    } else {
      badge.className = 'nav-badge';
      badge.href = '#' + CATEGORY_SLUGS[key];
      badge.style.background = hexToRgba(meta.color, 0.22);
      badge.style.border = `1px solid ${hexToRgba(meta.color, 0.55)}`;
      badge.style.color = meta.color;
      badge.innerHTML = `<span class="deco" style="background:${meta.color}"></span>${escapeHTML(key)}`;
    }
    nav.appendChild(badge);
  });
  app.appendChild(nav);

  // ---------- 篩選模式：只顯示單一系列 ----------
  if(activeCategory){
    const meta = seriesMeta[activeCategory] || SERIES_FALLBACK[activeCategory];
    const list = grouped[activeCategory] || [];
    const section = document.createElement('section');
    section.innerHTML = `<div class="section-head"><span class="eyebrow">系列</span></div>`;
    section.appendChild(buildSeriesBlock(activeCategory, list, meta));
    app.appendChild(section);
    return;
  }

  // ---------- 首頁模式：最新文章 ----------
  const dated = articles.filter(a => a.pubDate).sort((a,b) => parseDateValue(b.pubDate) - parseDateValue(a.pubDate));
  if(dated.length){
    const latest = dated.slice(0, MAX_LATEST);
    const section = document.createElement('section');
    section.innerHTML = `<div class="section-head"><span class="eyebrow">最新文章</span></div>`;
    const list = document.createElement('div');
    list.className = 'latest-list';
    latest.forEach(a => {
      const hasUrl = !!a.url;
      const row = document.createElement(hasUrl ? 'a' : 'div');
      row.className = 'latest-row';
      if(hasUrl){ row.href = a.url; row.target = '_blank'; row.rel = 'noopener'; }
      row.innerHTML = `<span class="t">${escapeHTML(a.title)}</span><span class="d">${escapeHTML(a.pubDate)}</span>`;
      list.appendChild(row);
    });
    section.appendChild(list);
    app.appendChild(section);
  }

  // ---------- 首頁模式：系列（固定順序：思考/實踐/職涯/課程 + 尚未分類）----------
  const seriesSection = document.createElement('section');
  seriesSection.innerHTML = `<div class="section-head"><span class="eyebrow">系列</span></div>`;
  CATEGORY_ORDER.forEach(key => {
    if(!grouped[key]) return;
    const meta = seriesMeta[key] || SERIES_FALLBACK[key];
    seriesSection.appendChild(buildSeriesBlock(key, grouped[key], meta));
  });
  if(grouped[UNSORTED_KEY]){
    seriesSection.appendChild(buildSeriesBlock(UNSORTED_KEY, grouped[UNSORTED_KEY], UNSORTED_META));
  }
  app.appendChild(seriesSection);
}

init();
</script>
</body>
</html>
